<svg xmlns="http://www.w3.org/2000/svg" width="560" height="660" viewBox="0 0 560 660" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="560" height="660" fill="#ffffff"/>
  <text x="280" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">legal-ops-agent — supervised legal workflow</text>
  <text x="280" y="54" text-anchor="middle" font-size="12" fill="#64748b">Deterministic checks before model synthesis · human approval before consequential output</text>

  <!-- Pipeline boxes -->
  <g font-size="13" fill="#0f172a">
    <rect x="160" y="74" width="240" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="280" y="101" text-anchor="middle">Typed intake (matter JSON)</text>

    <rect x="160" y="146" width="240" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="280" y="173" text-anchor="middle">Schema validation (Pydantic)</text>

    <rect x="160" y="218" width="240" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="280" y="245" text-anchor="middle">Deterministic risk triage</text>

    <rect x="160" y="290" width="240" height="44" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="280" y="317" text-anchor="middle">Reviewer routing</text>
  </g>

  <!-- Approval gate (diamond) -->
  <polygon points="280,366 408,410 280,454 152,410" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="280" y="406" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Approval gate</text>
  <text x="280" y="423" text-anchor="middle" font-size="11" fill="#64748b">human sign-off?</text>

  <!-- Outcomes -->
  <rect x="40" y="498" width="210" height="50" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="145" y="520" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">Export BLOCKED</text>
  <text x="145" y="537" text-anchor="middle" font-size="11" fill="#991b1b">approval required</text>

  <rect x="310" y="498" width="210" height="50" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="415" y="520" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Export approved</text>
  <text x="415" y="537" text-anchor="middle" font-size="11" fill="#166534">released to recipient</text>

  <!-- Audit packet -->
  <rect x="150" y="592" width="260" height="46" rx="8" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="280" y="620" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Audit packet (who · what · when)</text>

  <!-- Arrows -->
  <g stroke="#475569" stroke-width="1.6" fill="none">
    <line x1="280" y1="118" x2="280" y2="144" marker-end="url(#arrow)"/>
    <line x1="280" y1="190" x2="280" y2="216" marker-end="url(#arrow)"/>
    <line x1="280" y1="262" x2="280" y2="288" marker-end="url(#arrow)"/>
    <line x1="280" y1="334" x2="280" y2="364" marker-end="url(#arrow)"/>
    <!-- gate -> blocked (left) -->
    <path d="M180,424 C120,452 130,470 145,496" marker-end="url(#arrow)"/>
    <!-- gate -> approved (right) -->
    <path d="M380,424 C440,452 430,470 415,496" marker-end="url(#arrow)"/>
    <!-- outcomes -> audit -->
    <path d="M180,548 C210,572 230,576 250,590" marker-end="url(#arrow)"/>
    <path d="M380,548 C350,572 330,576 310,590" marker-end="url(#arrow)"/>
  </g>
  <text x="120" y="470" text-anchor="middle" font-size="11" fill="#991b1b">no</text>
  <text x="440" y="470" text-anchor="middle" font-size="11" fill="#166534">yes</text>

  <text x="280" y="654" text-anchor="middle" font-size="10.5" fill="#94a3b8">Public-safe prototype · synthetic data only · not legal advice</text>
</svg>
